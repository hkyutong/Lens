  <link rel="mask-icon" href="icon/safari-pinned-tab.svg" color="#19c37d">
  <script>
    window.__APP_BOOT_ERROR__ = function (msg) {
      try {
        var el = document.getElementById('app-boot-error')
        if (!el) {
          el = document.createElement('div')
          el.id = 'app-boot-error'
          el.style.position = 'fixed'
          el.style.bottom = '12px'
          el.style.left = '12px'
          el.style.right = '12px'
          el.style.zIndex = '999999'
          el.style.background = '#fee2e2'
          el.style.color = '#991b1b'
          el.style.padding = '10px 12px'
          el.style.borderRadius = '8px'
          el.style.fontSize = '12px'
          el.style.fontFamily = 'monospace'
          document.body.appendChild(el)
        }
        el.textContent = msg
      } catch (e) {}
    };
    window.addEventListener('error', function (e) {
      window.__APP_BOOT_ERROR__(String(e && e.message ? e.message : e));
    });
    window.addEventListener('unhandledrejection', function (e) {
      window.__APP_BOOT_ERROR__(String(e && e.reason ? e.reason : e));
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</head>

  <div id="app"></div>
